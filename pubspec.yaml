name: shahabfit
description: A new Flutter project.
publish_to: "none"

version: 1.0.5

environment:
  sdk: ">=3.1.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  shamsi_date: ^1.0.1
  url_launcher: ^6.1.10
  flutter_contacts: ^1.1.7+1
  permission_handler: ^11.2.1
  go_router: ^14.8.0
  path_provider: ^2.1.2
  device_info_plus: ^11.3.0
  flutter_bloc: ^9.0.0
  bloc: ^9.0.0
  shorebird_code_push: ^2.0.3
  shared_preferences: ^2.2.2
  package_info_plus: ^8.2.1
  pdf: ^3.10.8
  open_file: ^3.3.2
  pocketbase: ^0.21.0
  dio: ^5.4.1
  file_picker: ^8.0.0+1
  flutter_typeahead: ^5.2.0
  loading_animation_widget: ^1.2.1
  shimmer: ^3.0.0
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.14
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.4
  riverpod_lint: ^2.6.4
  custom_lint: ^0.7.3

flutter:
  assets:
    - images/
    - shorebird.yaml
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #  - images/
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: anjoman
      fonts:
        - asset: fonts/Anjoman-Black.ttf
          weight: 900
        - asset: fonts/Anjoman-UltraBold.ttf
          weight: 800
        - asset: fonts/Anjoman-ExtraBold.ttf
          weight: 700
        - asset: fonts/Anjoman-Bold.ttf
          weight: 600
        - asset: fonts/Anjoman-SemiBold.ttf
          weight: 500
        - asset: fonts/Anjoman-Medium.ttf
          weight: 400
        - asset: fonts/Anjoman-Regular.ttf
          weight: 300
        - asset: fonts/Anjoman-Light.ttf
          weight: 200
        - asset: fonts/Anjoman-ExtraLight.ttf
          weight: 100
    - family: Calibri
      fonts:
        - asset: fonts/Calibri.ttf

  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
